            padding: 5px 12px;

            margin: 3px;

        }

        .form-control {
            border-radius: 15px;
            border: 2px dashed #ffb6d5;

        .btn-kawaii {
            background: #ff5fa2;
            color: white;
            border-radius: 20px;
            padding: 8px 20px;

        }

        .btn-kawaii:hover {
